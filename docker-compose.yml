version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: plagiarism-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt bảo mật để bạn dễ code ở local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Mac M1 nên để 512MB cho nhẹ
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Dịch vụ Python gRPC 
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plagiarism-app
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "50051:50051"
    environment:
      - ES_HOST=elasticsearch
      - ES_PORT=9200

volumes:
  es_data:
    driver: local
