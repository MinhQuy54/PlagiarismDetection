version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.1
    container_name: plagiarism-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt bảo mật để bạn dễ code ở local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Mac M1 nên để 512MB cho nhẹ
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Dịch vụ Python gRPC 
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plagiarism-app
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
      - "${METRICS_PORT:-9107}:${METRICS_PORT:-9107}"
    environment:
      # Elasticsearch
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - ES_USER=${ES_USER}
      - ES_PASSWORD=${ES_PASSWORD}
      - ES_SCHEME=${ES_SCHEME:-http}
      - ES_INDEX=${ES_INDEX:-plagiarism_documents}
      # Analyzer
      - ANALYZER_MODE=${ANALYZER_MODE:-external}
      # # Gemini
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      # Ollama
      - OLLAMA_HOST=http://host.docker.internal:11434
      # gRPC
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=${GRPC_PORT:-50051}
      - GRPC_MAX_WORKERS=${GRPC_MAX_WORKERS:-3}
      # TLS - paths inside container
      - GRPC_TLS_ENABLED=${GRPC_TLS_ENABLED:-false}
      - GRPC_CERT_PATH=/app/certs/plagiarism-server.crt
      - GRPC_KEY_PATH=/app/certs/plagiarism-server.key
      - GRPC_CA_PATH=/app/certs/ca.crt
      - GRPC_REQUIRE_CLIENT_CERT=${GRPC_REQUIRE_CLIENT_CERT:-false}
      # MinIO
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - METRICS_PORT=${METRICS_PORT:-9107}
    volumes:
      - ./certs:/app/certs:ro
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio:
    image: minio/minio:latest
    container_name: plagiarism-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ui:
    build: .
    container_name: plagiarism-ui
    command: streamlit run src/ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - GRPC_SERVER=app:50051
    depends_on:
      - app
    volumes:
      - .:/app
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.1
    container_name: plagiarism-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'green'" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  es_data:
    driver: local
  minio_data:
    driver: local
