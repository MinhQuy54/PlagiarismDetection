version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.1
    container_name: plagiarism-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt bảo mật để bạn dễ code ở local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Mac M1 nên để 512MB cho nhẹ
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Dịch vụ Python gRPC 
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plagiarism-app
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
      - "${METRICS_PORT:-9107}:${METRICS_PORT:-9107}"
    env_file:
      - .env
    environment:
      - ES_HOST=elasticsearch
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MINIO_ENDPOINT=minio
      - GRPC_CERT_PATH=/app/certs/plagiarism-server.crt
      - GRPC_KEY_PATH=/app/certs/plagiarism-server.key
      - GRPC_CA_PATH=/app/certs/ca.crt
    volumes:
      - ./certs:/app/certs:ro
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio:
    image: minio/minio:latest
    container_name: plagiarism-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ui:
    build: .
    container_name: plagiarism-ui
    command: streamlit run src/ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - GRPC_SERVER=app:50051
    depends_on:
      - app
    volumes:
      - .:/app
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.1
    container_name: plagiarism-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'green'" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  es_data:
    driver: local
  minio_data:
    driver: local
